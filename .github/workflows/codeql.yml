name: codeql

# Static analysis (OpenSSF Scorecard SAST). Analyzes the real code surface:
# JavaScript and Python. Shell is not a CodeQL-supported language, so it is
# out of scope here. build-mode is "none" because neither language compiles in
# this repo. Runs on ubuntu-latest (the test.yml suites need macOS; CodeQL does
# not) on push/PR to main and weekly, so drift is caught even without a PR.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

# Least-privilege default: read-only at the workflow level. The write scope
# (security-events, to upload findings to the Security tab) is granted only on
# the analyze job below — Scorecard Token-Permissions rewards job-scoped writes.
permissions:
  contents: read

jobs:
  analyze:
    name: analyze
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Only this job needs to write analysis results. For a public repo with
    # build-mode none, contents:read + security-events:write is the documented
    # minimum (actions:read / packages:read are private-repo / build extras).
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript, python]
    steps:
      # All Action refs pinned to full commit SHAs (Pinned-Dependencies).
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v3
        with:
          languages: ${{ matrix.language }}
          build-mode: none

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v3
        with:
          category: "/language:${{ matrix.language }}"
