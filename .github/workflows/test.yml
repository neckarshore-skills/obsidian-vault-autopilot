name: test

# Least-privilege default token: this workflow only checks out and runs the
# read-only assertion suites, so read access to repo contents is all it needs
# (OpenSSF Scorecard Token-Permissions; D4 fail-closed).
permissions:
  contents: read

# Runs every assertion suite under scripts/test-*.sh on push and PR.
# Phase 1 of docs/plans/2026-06-11-skill-hardening-fable-pilot.md — before
# this workflow existed, the suites ran only when someone remembered to.
#
# Runner is macos-latest deliberately: the suites were authored against the
# BSD toolchain (test-clone-cluster.sh reads birthtime via `stat -f '%B'`,
# the fixture generator sets it via `touch -t` — both macOS semantics).
# macOS runners are free for public repos. Linux-portability of the suites
# is tracked as backlog, not assumed.

on:
  push:
  pull_request:

jobs:
  assertion-suites:
    runs-on: macos-latest
    timeout-minutes: 10
    steps:
      # Pinned to a full commit SHA (OpenSSF Scorecard Pinned-Dependencies).
      # The trailing comment keeps the human-readable version for Dependabot bumps.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run all assertion suites
        run: |
          set -u
          overall=0
          for t in scripts/test-*.sh; do
            echo "::group::${t}"
            if bash "$t"; then
              echo "RESULT: PASS ${t}"
            else
              echo "RESULT: FAIL ${t}"
              overall=1
            fi
            echo "::endgroup::"
          done
          exit "$overall"

      - name: Verify fixture encoding invariants survived checkout
        run: |
          file tests/fixtures/yaml-sanity-verdicts/notes/cell-17-bom-frontmatter.md | grep BOM
          file tests/fixtures/yaml-sanity-verdicts/notes/cell-18-crlf-frontmatter.md | grep CRLF

  # Estate stats.json producer (test-scope facet, backlog #394 / Phase-3 breadth rollout).
  # Publishes a contract-conformant stats.json to the UNPROTECTED `stats-data` branch on every
  # push:main, AFTER the assertion-suites gate. Runs even when the gate fails (if: always) so a
  # non-green run emits red:true — never a stale-green count. contents:write is scoped to THIS job
  # only; publishing to stats-data (not main) keeps main's branch protection fully intact — no bypass
  # actor, no weakened required check. main is public + protected (enforce_admins + required
  # assertion-suites check); a bot push to main is correctly rejected, so the machine artifact lives
  # on its own unprotected single-file branch instead (Approach E, trustscope precedent PR #63).
  #
  # Count comes from node's OWN TAP reporter (never grep). The 3 gated node --test suites are the
  # per-assertion-countable ones; their `node --test --test-reporter=tap` output is normalized to the
  # action's TAP-lite dialect (strip the test number: `ok 1 - x` -> `ok - x`) so its node handler
  # counts one line per passed top-level test = 293. The node --test globs are derived from the
  # gated bridge scripts (scripts/test-*.sh) so the count auto-tracks if a node suite is added.
  # The 10 pure-bash suites are gated too but emit one PASS/FAIL per script (not per-assertion), so
  # they are NOT foldable into a per-test total and are deliberately left out of byType (documented
  # in the README). `red` comes from the assertion-suites gate's real result (it ran all 13).
  # Runs on macos-latest to match the gate's node environment exactly (count parity).
  # Contract: https://github.com/neckarshore-ai/neckarshore-planning/blob/main/docs/reference/stats-json-contract.md
  emit-stats:
    name: Emit stats.json (estate producer)
    needs: assertion-suites
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: macos-latest
    timeout-minutes: 10
    permissions:
      contents: write
    concurrency:
      # Serialize emits so two rapid pushes cannot race on the git push to stats-data.
      group: emit-stats-${{ github.ref }}
      cancel-in-progress: false
    steps:
      # Default persist-credentials (true) — the publish step pushes stats.json to the UNPROTECTED
      # stats-data branch via the job's contents:write GITHUB_TOKEN (github-actions[bot]).
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Uses the runner's preinstalled node — the SAME node the assertion-suites gate runs on (the
      # gate has no setup-node step either), so the count is taken on the identical toolchain.
      - name: Capture node reporter (normalized TAP-lite from node's own TAP output)
        run: |
          set -uo pipefail
          # Derive the gated node --test targets from the bridge scripts so this auto-tracks additions.
          globs=$(grep -hoE 'node --test [^ ]+\.test\.js' scripts/test-*.sh | sed 's|node --test ||' | sort -u)
          [ -n "$globs" ] || { echo "::error::no node --test targets found in scripts/test-*.sh"; exit 1; }
          : > /tmp/node.tap
          while IFS= read -r glob; do
            # $glob is one pattern (e.g. skills/tag-manage/tests/*.test.js); unquoted for expansion.
            # Keep ONLY top-level passed-test lines (`^ok N - `) and normalize to `ok - ` (the action's
            # node handler matches `^\s*ok\s+-`, which node's numbered TAP would otherwise miss).
            # `not ok`/indented/diagnostic lines are excluded; on a red run the undercount is fine
            # because `red:true` (from the gate) excludes this producer from the estate total.
            node --test --test-reporter=tap $glob 2>/dev/null \
              | grep -E '^ok [0-9]+ - ' | sed -E 's/^ok [0-9]+ - /ok - /' >> /tmp/node.tap || true
          done <<< "$globs"
          echo "node.tap ok-lines: $(grep -cE '^[[:space:]]*ok[[:space:]]+-' /tmp/node.tap)"

      # Pass/fail comes from the gate job's real result (it ran all 13 gated suites), never from
      # untrusted event text — no injection surface.
      - name: Compute test result from the gate
        id: result
        env:
          GATE_RESULT: ${{ needs.assertion-suites.result }}
        run: |
          if [ "$GATE_RESULT" = "success" ]; then
            echo "value=success" >> "$GITHUB_OUTPUT"
            echo "detail=" >> "$GITHUB_OUTPUT"
          else
            echo "value=failure" >> "$GITHUB_OUTPUT"
            echo "detail=assertion-suites gate: $GATE_RESULT" >> "$GITHUB_OUTPUT"
          fi

      # SHA-pinned (third-party actions are never tag-floated). 54ae407 is the PIR-passed pin.
      - name: Emit stats.json
        uses: neckarshore-ai/test-stats-action@54ae407769bdfea6b8fed2672f0ceefa5ef2588a
        with:
          repo: ${{ github.repository }}
          out: stats.json
          sha: ${{ github.sha }}
          test_result: ${{ steps.result.outputs.value }}
          red_detail: ${{ steps.result.outputs.detail }}
          runners: |
            unit:node:/tmp/node.tap

      # Structural contract gate — invariants that hold on BOTH green and red runs. Deliberately
      # does NOT assert a golden total (a red run legitimately undercounts and must still emit red:true).
      - name: Validate emitted stats.json against the contract
        run: |
          jq -e --arg repo "$GITHUB_REPOSITORY" '
            .repo == $repo
            and (.audited_sha | type == "string" and length > 0)
            and (.tests.total == ([.tests.byType[]] | add))
            and (.tests.byType | has("unit"))
            and (.red | type == "boolean")
          ' stats.json > /dev/null \
            || { echo "::error::stats.json failed contract validation"; cat stats.json; exit 1; }
          echo "stats.json is contract-valid:"; cat stats.json

      # Publish to the UNPROTECTED stats-data branch via git PLUMBING (hash-object → mktree →
      # commit-tree → push), NOT a working-tree checkout. stats-data is an orphan single-file branch
      # sharing no history with main, so `git checkout stats-data` would abort. Plumbing writes one
      # blob + one tree + one commit and pushes the ref, never switching branches. The orphan branch
      # carries NO workflow files, so a push to it triggers no CI — the re-emit loop is structurally
      # impossible. Diff-guard on everything except updatedAt so a same-sha re-run causes no churn.
      - name: Publish stats.json to the stats-data branch when it changed
        env:
          GIT_AUTHOR_NAME: "github-actions[bot]"
          GIT_AUTHOR_EMAIL: "github-actions[bot]@users.noreply.github.com"
          GIT_COMMITTER_NAME: "github-actions[bot]"
          GIT_COMMITTER_EMAIL: "github-actions[bot]@users.noreply.github.com"
        run: |
          set -euo pipefail
          norm() { jq -S 'del(.updatedAt)' "$1" 2>/dev/null; }
          git fetch origin +refs/heads/stats-data:refs/remotes/origin/stats-data 2>/dev/null || true
          if git show origin/stats-data:stats.json > /tmp/prev-stats.json 2>/dev/null \
             && [ "$(norm /tmp/prev-stats.json)" = "$(norm stats.json)" ]; then
            echo "stats.json unchanged (ignoring timestamp) — nothing to publish."
            exit 0
          fi
          BLOB=$(git hash-object -w stats.json)
          TREE=$(printf '100644 blob %s\tstats.json\n' "$BLOB" | git mktree)
          MSG="chore(stats): emit stats.json @ ${GITHUB_SHA:0:7}"
          if git rev-parse --verify origin/stats-data >/dev/null 2>&1; then
            COMMIT=$(git commit-tree "$TREE" -p origin/stats-data -m "$MSG")
          else
            COMMIT=$(git commit-tree "$TREE" -m "$MSG")
          fi
          # Belt: an empty source refspec (":refs/heads/stats-data") is a DELETE, not a no-op — an
          # empty $COMMIT would delete stats-data. set -e already aborts on a failed commit-tree; this
          # is the explicit guard so a branch deletion can never depend on implicit -e.
          [ -n "$COMMIT" ] || { echo "::error::commit-tree produced no commit — refusing to push (would delete stats-data)"; exit 1; }
          git push origin "${COMMIT}:refs/heads/stats-data"
