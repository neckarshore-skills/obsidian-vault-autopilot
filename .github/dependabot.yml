# Keeps GitHub Actions references current (OpenSSF Scorecard Dependency-Update-Tool).
# Only the github-actions ecosystem applies: the repo is JavaScript + Shell + Python
# with no package.json / npm manifest, so there is nothing for an npm updater to lock.
# Add an "npm" block here only if a package.json is ever introduced.
#
# Grouping (auto-merge policy 2026-07-10): minor + patch action bumps collapse into ONE
# weekly grouped PR (fewer PRs, atomic merges — self-clears via the auto-merge workflow).
# Majors are deliberately left UNGROUPED so each surfaces as its own PR for human review.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      # CodeQL's init and analyze are the SAME action at the same SHA and must move
      # together. Grouping them across ALL update-types (majors included) is the point:
      # ungrouped, a major arrives as two PRs that each break the pair, and neither can
      # ever pass. Review is NOT weakened — the combined PR is still a major, and the
      # adopted policy holds ALL github-actions majors to manual review (major -> manual
      # wins universally, no per-action name list). A human still merges it.
      #
      # Declared BEFORE github-actions-minor-patch: the "*" pattern below would otherwise
      # swallow the codeql entries if Dependabot applies first-match-wins on overlap.
      codeql-action:
        patterns:
          - "github/codeql-action*"
        update-types:
          - "major"
          - "minor"
          - "patch"

      github-actions-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
